kind = "web"
previewPath = "/"
title = "Poetry Visualization Engine"
version = "1.0.0"
id = "artifacts/poetry-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24904

[services.development]
run = "pnpm --filter @workspace/poetry-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poetry-engine", "run", "build" ]
publicDir = "artifacts/poetry-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24904"
BASE_PATH = "/"
