openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poetry
    description: Poetry scene composition
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /compose-scene:
    post:
      operationId: composeScene
      tags: [poetry]
      summary: Compose a 3D scene from a poetry line
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComposeSceneRequest"
      responses:
        "200":
          description: Scene parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneParams"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    ComposeSceneRequest:
      type: object
      properties:
        line:
          type: string
        context:
          type: array
          items:
            type: string
      required: [line]
    SceneParams:
      type: object
      required:
        - sceneType
        - skyColor
        - fogColor
        - fogDensity
        - groundColor
        - ambientColor
        - lightColor
        - lightIntensity
        - turbulence
        - timeOfDay
        - terrain
        - terrainHeight
        - terrainScale
        - water
        - waterColor
        - waterOpacity
        - trees
        - treeColor
        - buildings
        - columns
        - fire
        - particles
        - particleColor
        - particleSize
        - particleCount
        - particleMotion
        - particleSpread
        - spheres
        - sphereColor
        - stars
        - rings
        - ringColor
        - cameraAngle
      properties:
        sceneType:
          type: string
          enum: [void, ocean, forest, mountain, city, ruins, fire, cosmos, desert, field, cave, storm]
          description: Dominant world archetype — pick whichever best matches the line's imagery
        skyColor:
          type: string
          description: Hex color for sky/background
        fogColor:
          type: string
        fogDensity:
          type: number
          minimum: 0.001
          maximum: 0.08
        groundColor:
          type: string
          description: Hex color for ground/terrain surface
        ambientColor:
          type: string
          description: Hex color for ambient fill light
        lightColor:
          type: string
          description: Hex color for main directional light
        lightIntensity:
          type: number
          minimum: 0
          maximum: 4
        turbulence:
          type: number
          minimum: 0
          maximum: 1
          description: 0=serene/still, 1=violent chaos
        timeOfDay:
          type: number
          minimum: 0
          maximum: 1
          description: 0=midnight, 0.25=dawn, 0.5=noon, 0.75=dusk, 1=midnight
        terrain:
          type: number
          minimum: 0
          maximum: 1
          description: Presence of terrain/hills (0=flat, 1=dramatic)
        terrainHeight:
          type: number
          minimum: 0.5
          maximum: 12
        terrainScale:
          type: number
          minimum: 0.3
          maximum: 5
        water:
          type: number
          minimum: 0
          maximum: 1
        waterColor:
          type: string
        waterOpacity:
          type: number
          minimum: 0.1
          maximum: 1
        trees:
          type: number
          minimum: 0
          maximum: 1
          description: Forest density
        treeColor:
          type: string
        buildings:
          type: number
          minimum: 0
          maximum: 1
        columns:
          type: number
          minimum: 0
          maximum: 1
          description: Ancient ruin columns
        fire:
          type: number
          minimum: 0
          maximum: 1
        particles:
          type: number
          minimum: 0
          maximum: 1
          description: Particle effect density — use liberally for dust, rain, snow, embers, sparks, petals, mist
        particleColor:
          type: string
        particleSize:
          type: number
          minimum: 0.01
          maximum: 0.8
          description: 0.01=fine dust/mist, 0.05=small dots, 0.2=noticeable flakes, 0.8=large orbs
        particleCount:
          type: number
          minimum: 100
          maximum: 8000
        particleMotion:
          type: string
          enum: [still, float, rain, rise, spiral, orbit, scatter, drift, pulse]
        particleSpread:
          type: number
          minimum: 5
          maximum: 60
          description: How widely particles are spread in the scene
        spheres:
          type: number
          minimum: 0
          maximum: 1
          description: Glowing orbs/celestial bodies
        sphereColor:
          type: string
        stars:
          type: number
          minimum: 0
          maximum: 1
        rings:
          type: number
          minimum: 0
          maximum: 1
          description: Geometric ring shapes floating in scene
        ringColor:
          type: string
        cameraAngle:
          type: string
          enum: [horizon, high, low, closeup, wide]
          description: Viewing angle — low=dramatic upward, high=bird's eye, horizon=eye level, closeup=intimate, wide=expansive
